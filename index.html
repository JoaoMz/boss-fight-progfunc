<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="assets/style.css">
    <title>Fight</title>
</head>
<body>
    <div class="fight-area">
        <div class="hero" id="char">
            <div class="name-hero"><strong>Hero</strong></div>
            <div class="hero-life">
                <div class="hero-life-bar"> <div class="bar"></div></div>
            </div>
            <div class="hero-image"><img src="assets/img/hero.png" alt=""></div>
            <br>
            <div><button class="attack-button">Attack</button></div>
        </div>

        <div class="monster" id="monster">
            <div class="name-monster"><strong>Monster</strong></div>
            <div class="monster-life">
                <div class="monster-life-bar"> <div class="bar"></div></div>
            </div>
            <div class="monster-image"><img src="assets/img/monster.png" alt=""></div>
            <br>
            <div><button class="attack-button">Attack</button></div>
        </div>
        
    </div>

    <ul class="log"></ul>
        
    <script src="assets/js/funcoes.js"></script>
    <script src="assets/js/script.js"></script>
</body>
</html>
